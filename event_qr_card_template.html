<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>イベント用QRカード テンプレ</title>
<style>body{font-family:system-ui,"Segoe UI",sans-serif;margin:0;background:#fff7d6;color:#342846}.card{width:90mm;min-height:120mm;margin:10mm auto;padding:8mm;border:2mm solid #ffb5d1;border-radius:8mm;background:white;text-align:center}.qr{width:48mm;height:48mm;border:1mm dashed #aaa;margin:5mm auto;display:flex;align-items:center;justify-content:center;color:#777;font-weight:900}h1{font-size:18pt;margin:0 0 3mm}.lead{font-weight:900}.small{font-size:9pt;color:#746981;text-align:left}</style>
</head><body><div class="card">
<h1>きらきら作例シミュレーター</h1>
<p class="lead">QRを読み込んで、形と色を試せます。</p>
<div class="qr">ここにQRを貼る</div>
<p>作った画面をスクショして、店員に見せてください。</p>
<p class="small">URL：<br>https://あなたのURL/</p>
<p class="small">一度開いてホーム画面に追加すると、通信が弱い場所でも使いやすくなります。</p>
</div></body></html>
